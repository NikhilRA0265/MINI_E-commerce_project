version: '3.8'

services:
  backend:
    build: ./backend_for_MEC
    container_name: mern-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=your_mongodb_atlas_uri
    networks:
      - mern-network

  frontend:
    build: ./frontend_for_MEC
    container_name: mern-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge